 <script LANGUAGE="Javascript" >
function validate(){
	var x=document.forms["f1"]["t1"].value;
	var y=document.forms["f1"]["t2"].value;
	var a=document.forms["f1"]["t3"].value;
	
	
	if(x == null || x==""){
		window.alert("Report data must be enter");
		document.f1.t1.focus();
		return false;
	}
	if(y == null || y==""){
		window.alert("Temperature must be enter");
		document.f1.t2.focus();
		return false;
	}
	if(a == null || a==""){
		window.alert("Humidity must be enter");
		document.f1.t3.focus();
		return false;
	}
	
	return true;
}
</script>
